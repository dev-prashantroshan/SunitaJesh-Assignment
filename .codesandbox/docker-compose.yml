services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  seed:
    build:
      context: ../backend
    command: npm run seed
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/sunita-jesh-assignment
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ../backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/sunita-jesh-assignment
    depends_on:
      seed:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ""
        NGINX_CONFIG: nginx.codesandbox.conf
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  mongo-data:
